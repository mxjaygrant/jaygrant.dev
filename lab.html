<!DOCTYPE html>

	<script src="js/base.js"></script>
	<link rel="stylesheet" href="css/base.css">
	<style>
		:root{
			--deColor: blue;
			--primary-color-darker: lch(from var(--primary-color) calc(l - 7) calc(c + 5) h);
		}
		
		.colors {
			border: 1px solid green;
			height: 10em;
			width: 10em;
			background-color: var(--deColor);
		}

		form {
			margin: 2rem auto;
		}

		input {
			margin: 10px;
			font-size: 1.5em;
			text-size-adjust: 125%;
		}

		input[type="radio"] {
			height: 2em;
			width: 2em;
		}

		#red:clicked ~ .colors {
		   --deColor: red;
		}
		#green:checked ~ .colors {
		   --deColor: green !important;
		}
		#purple:checked ~ .colors {
		   --deColor: purple !important;
		}

		.select:active ~ .colors {
			--deColor: yellow;
			}



		body>header{
			background-image: 
			linear-gradient(180deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(200deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(220deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(240deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(260deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(280deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(300deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(320deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(340deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(360deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(180deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(200deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(220deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(240deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(260deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(280deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(300deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(320deg, transparent 50%, var(--primary-color-darker) 50%),
			linear-gradient(340deg, transparent 50%, var(--primary-color) 50%),
			linear-gradient(360deg, transparent 50%, var(--primary-color-darker) 50%);
			background-color: var(--primary-color);
			background-size: 100% 200%;
			overflow: visible;
			padding: 1rem 0 0;
			nav {
				border-top: 5px solid var(--primary-color-darker);
				background-color: var(--primary-color);
			}
			svg {
				height: 20vh;
				.stop-1 {
					stop-color: var(--primary-color-compliment-light);
				}
				.stop-2 {
					stop-color: var(--primary-color-compliment);
				}
				.stop-3 {
					stop-color: var(--primary-color-compliment-dark);
				}
			}
		}
		section {
				padding: 1rem 0;
			}
	</style>
</head>
